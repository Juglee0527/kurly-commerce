apiVersion: apps/v1
kind: Deployment
metadata:
  name: kurly-frontend
  namespace: kurly-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kurly-frontend
  template:
    metadata:
      labels:
        app: kurly-frontend
    spec:
      containers:
        - name: frontend
          image: kurly/frontend:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: kurly-frontend
  namespace: kurly-commerce
spec:
  selector:
    app: kurly-frontend
  ports:
    - port: 3000
      targetPort: 3000
